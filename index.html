<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faisal TV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="logo-splash">
                <span class="logo-text-splash">Faisal</span>
                <span class="logo-tv-splash">TV</span>
                <i class="fas fa-crown"></i>
            </div>
            <div class="loader"></div>
            <p class="loading-text">جاري التحميل...</p>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container" id="appContainer" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="icon-btn" id="searchBtn" title="بحث">
                    <i class="fas fa-search"></i>
                </button>
                <button class="icon-btn" id="refreshBtn" title="تحديث">
                    <i class="fas fa-sync"></i>
                </button>
                <button class="icon-btn" id="themeBtn" title="إضاءة">
                    <i class="fas fa-sun"></i>
                </button>
            </div>
            
            <div class="logo">
                <span class="logo-text">Faisal</span>
                <span class="logo-tv">TV</span>
                <i class="fas fa-crown"></i>
            </div>
            
            <div class="header-right">
                <a href="https://t.me/FAISALDz44" target="_blank" class="telegram-btn" title="تليجرام">
                    <i class="fab fa-telegram"></i>
                    <span>@FAISALDz44</span>
                </a>
                <button class="icon-btn" id="menuBtn" title="القائمة">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <!-- Search Panel -->
        <div class="search-panel" id="searchPanel">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث عن القنوات والأفلام...">
                <button id="searchClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Settings Sidebar Menu -->
        <div class="settings-sidebar" id="settingsSidebar">
            <div class="settings-header">
                <h2>الإعدادات</h2>
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="settings-content">
                <!-- Theme Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-palette"></i> الثيم</h3>
                    <div class="settings-option">
                        <label>
                            <input type="radio" name="theme" value="dark" checked>
                            <span>الوضع الداكن</span>
                        </label>
                    </div>
                    <div class="settings-option">
                        <label>
                            <input type="radio" name="theme" value="light">
                            <span>الوضع الفاتح</span>
                        </label>
                    </div>
                </div>

                <!-- Quality Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-video"></i> جودة البث الافتراضية</h3>
                    <select id="defaultQuality" class="settings-select">
                        <option value="4K">4K</option>
                        <option value="1080p">1080p</option>
                        <option value="720p" selected>720p</option>
                        <option value="480p">480p</option>
                        <option value="360p">360p</option>
                    </select>
                </div>

                <!-- Language Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-globe"></i> اللغة</h3>
                    <select id="language" class="settings-select">
                        <option value="ar" selected>العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>

                <!-- Notification Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-bell"></i> الإشعارات</h3>
                    <div class="settings-option">
                        <label>
                            <input type="checkbox" id="notificationToggle" checked>
                            <span>تفعيل الإشعارات</span>
                        </label>
                    </div>
                </div>

                <!-- AutoPlay Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-play"></i> التشغيل التلقائي</h3>
                    <div class="settings-option">
                        <label>
                            <input type="checkbox" id="autoplayToggle">
                            <span>تشغيل تلقائي للفيديوهات</span>
                        </label>
                    </div>
                </div>

                <!-- Server Settings -->
                <div class="settings-section">
                    <h3><i class="fas fa-server"></i> إعدادات الخادم</h3>
                    <div class="settings-input">
                        <label>رابط الخادم</label>
                        <input type="text" id="serverHost" placeholder="http://longsat.xyz:80" class="input-field">
                    </div>
                    <div class="settings-input">
                        <label>اسم المستخدم</label>
                        <input type="text" id="serverUser" placeholder="delfraissy" class="input-field">
                    </div>
                    <div class="settings-input">
                        <label>كلمة السر</label>
                        <input type="password" id="serverPass" placeholder="••••••••" class="input-field">
                    </div>
                    <button class="btn-save-settings" id="saveServerSettings">حفظ إعدادات الخادم</button>
                </div>

                <!-- Cache & Storage -->
                <div class="settings-section">
                    <h3><i class="fas fa-trash"></i> التخزين</h3>
                    <button class="btn-danger" id="clearCache">مسح الذاكرة المؤقتة</button>
                    <button class="btn-danger" id="clearHistory">مسح السجل</button>
                </div>

                <!-- About -->
                <div class="settings-section">
                    <h3><i class="fas fa-info-circle"></i> عن التطبيق</h3>
                    <p class="about-text">
                        <strong>Faisal TV</strong><br>
                        الإصدار: 1.0.0<br>
                        تطبيق بث مباشر احترافي<br>
                        <a href="https://t.me/FAISALDz44" class="about-link">@FAISALDz44</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="tab-btn active" data-category="channels">
                <i class="fas fa-tv"></i>
                <span>القنوات</span>
            </button>
            <button class="tab-btn" data-category="movies">
                <i class="fas fa-film"></i>
                <span>الأفلام</span>
            </button>
            <button class="tab-btn" data-category="series">
                <i class="fas fa-play-circle"></i>
                <span>المسلسلات</span>
            </button>
            <button class="tab-btn" data-category="sports">
                <i class="fas fa-football-ball"></i>
                <span>الرياضة</span>
            </button>
            <button class="tab-btn" data-category="news">
                <i class="fas fa-newspaper"></i>
                <span>أخبار</span>
            </button>
        </nav>

        <!-- Sub Categories (Sports Subcategory) -->
        <div class="subcategory-container" id="subcategory" style="display:none;">
            <div class="subcategory-scroll">
                <button class="subcategory-btn active" data-subcategory="all">الكل</button>
                <button class="subcategory-btn" data-subcategory="bein">beIN Sports</button>
                <button class="subcategory-btn" data-subcategory="ssc">SSC</button>
                <button class="subcategory-btn" data-subcategory="aloroba">الرياضة العربية</button>
                <button class="subcategory-btn" data-subcategory="premier">البريميير</button>
                <button class="subcategory-btn" data-subcategory="la-liga">لا ليجا</button>
            </div>
        </div>

        <!-- Channels/Content Grid -->
        <main class="content-grid" id="contentGrid">
            <!-- Will be populated by JavaScript -->
        </main>
